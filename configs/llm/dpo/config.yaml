# ============================================
# DPO (Direct Preference Optimization) 配置
# ============================================
# 目标: 基于偏好数据对齐模型，让模型学会生成更好的回复
# 数据格式: Preference Data (prompt + chosen + rejected)
# 训练方式: DPO 无需奖励模型，直接优化策略

# 模型配置
model:
  # 策略模型 (待训练的模型)
  model_path: "./outputs/llm_sft/final"
  
  # 参考模型 (通常为 SFT 模型)
  # 如果为 null，则使用 model_path 且不更新梯度
  ref_model_path: null
  
  trust_remote_code: true
  torch_dtype: "bf16"
  use_flash_attention: true

# 数据配置
data:
  train_data_path: "./data/preference/train.jsonl"
  eval_data_path: "./data/preference/val.jsonl"
  
  # 字段映射
  prompt_column: "prompt"            # 提示字段
  chosen_column: "chosen"            # 偏好回复字段
  rejected_column: "rejected"        # 非偏好回复字段
  
  # 长度限制
  max_length: 2048                   # 总长度限制
  max_prompt_length: 1024            # prompt 长度限制
  
  # 截断策略
  truncation_mode: "keep_end"        # keep_end/keep_start

# DPO 特定配置
dpo:
  # DPO temperature 参数 (beta)
  # 较小的 beta -> 模型更激进地学习偏好
  # 较大的 beta -> 模型更保守，保持接近参考模型
  beta: 0.1
  
  # Label smoothing (0-1)
  label_smoothing: 0.0
  
  # Loss 类型: sigmoid/hinge/ipo/kto_pair
  loss_type: "sigmoid"
  
  # 是否使用权重平均
  f_divergence_type: "reverse_kl"

# 训练配置
training:
  output_dir: "./outputs/llm_dpo"
  
  # DPO 训练通常需要较少轮数
  num_train_epochs: 1
  
  per_device_train_batch_size: 2     # DPO 需要更多显存
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 4
  
  # DPO 学习率通常较小
  learning_rate: 5.0e-5
  warmup_ratio: 0.1
  lr_scheduler_type: "cosine"
  
  weight_decay: 0.01
  max_grad_norm: 1.0
  
  save_strategy: "steps"
  save_steps: 500
  save_total_limit: 3
  
  evaluation_strategy: "steps"
  eval_steps: 500
  
  logging_strategy: "steps"
  logging_steps: 10
  
  fp16: false
  bf16: true
  
  dataloader_num_workers: 4
  gradient_checkpointing: true
  remove_unused_columns: false

# LoRA 配置 (DPO 阶段常用)
lora:
  use_lora: true
  r: 8
  alpha: 32
  dropout: 0.1
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
  bias: "none"

seed: 42
report_to: ["tensorboard"]
