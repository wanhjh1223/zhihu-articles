# ============================================
# LLM 预训练阶段配置 (Pre-training)
# ============================================
# 目标: 在领域数据上继续预训练，学习领域知识和语言模式
# 数据格式: 纯文本 (raw text)
# 训练方式: 因果语言建模 (Causal LM)

# 模型配置
model:
  name: "Qwen/Qwen2.5-7B"           # 基础模型名称或路径
  model_revision: "main"             # 模型版本
  trust_remote_code: true            # 信任远程代码
  torch_dtype: "bf16"                # 训练精度: bf16/fp16/fp32
  use_flash_attention: true          # 使用 Flash Attention 加速
  
  # 量化配置 (预训练阶段建议不使用量化)
  load_in_8bit: false
  load_in_4bit: false

# 数据配置
data:
  # 训练数据路径 (纯文本格式)
  train_data_path: "./data/pretrain/train.jsonl"
  
  # 验证数据路径 (可选)
  eval_data_path: "./data/pretrain/val.jsonl"
  
  # 数据格式配置
  text_column: "text"                # 文本字段名
  max_length: 2048                   # 最大序列长度
  
  # 数据预处理
  preprocessing:
    concat_samples: true             # 是否拼接样本以充分利用序列长度
    samples_concat_window: 1000      # 拼接窗口大小

# 训练配置
training:
  output_dir: "./outputs/llm_pretrain"
  
  # 训练轮数
  num_train_epochs: 3
  
  # Batch 配置
  per_device_train_batch_size: 4     # 每设备训练 batch size
  per_device_eval_batch_size: 4      # 每设备验证 batch size
  gradient_accumulation_steps: 4     # 梯度累积步数
  
  # 学习率配置
  learning_rate: 1.0e-4              # 预训练使用较小学习率
  warmup_ratio: 0.01                 # 预热比例
  lr_scheduler_type: "cosine"        # 学习率调度器
  
  # 优化器配置
  weight_decay: 0.01                 # 权重衰减
  max_grad_norm: 1.0                 # 梯度裁剪
  
  # 保存配置
  save_strategy: "steps"             # 保存策略: steps/epoch
  save_steps: 1000                   # 每 N 步保存
  save_total_limit: 3                # 最多保留 checkpoint 数量
  
  # 验证配置
  evaluation_strategy: "steps"
  eval_steps: 1000
  
  # 日志配置
  logging_strategy: "steps"
  logging_steps: 10
  
  # 性能优化
  fp16: false                        # 是否使用 FP16
  bf16: true                         # 是否使用 BF16 (推荐A100)
  dataloader_num_workers: 4          # 数据加载线程数
  dataloader_pin_memory: true
  
  # 梯度检查点 (节省显存)
  gradient_checkpointing: true
  
  # DeepSpeed 配置 (可选)
  # deepspeed: "./configs/deepspeed/zero2.json"

# LoRA 配置 (预训练阶段可选使用)
lora:
  use_lora: false                    # 预训练通常全参数微调
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
  bias: "none"

# 其他配置
seed: 42
report_to: ["tensorboard"]           # 日志记录: tensorboard/wandb
