# ============================================
# GRPO (Generalized Reward-Penalty Optimization) 配置
# ============================================
# 目标: 基于群组相对策略优化，提升模型性能
# 数据格式: Prompt only (模型自行生成多个回复进行对比)
# 训练方式: 群组采样 + 相对奖励

# 模型配置
model:
  model_path: "./outputs/llm_sft/final"
  trust_remote_code: true
  torch_dtype: "bf16"
  use_flash_attention: true

# 数据配置
data:
  # GRPO 只需要 prompt
  train_data_path: "./data/grpo/train.jsonl"
  eval_data_path: "./data/grpo/val.jsonl"
  
  prompt_column: "prompt"
  max_prompt_length: 1024

# GRPO 特定配置
grpo:
  # 每个 prompt 生成的回复数量
  num_generations: 8
  
  # 温度系数
  temperature: 0.9
  
  # Top-p 采样
  top_p: 0.95
  
  # KL 散度系数
  kl_coeff: 0.01
  
  # 奖励函数配置
  reward_functions:
    - type: "length"                 # 长度奖励
      min_length: 50
      max_length: 500
    - type: "format"                # 格式奖励
      regex: "^##

.*##

.*$"
    # - type: "custom"              # 自定义奖励函数
    #   module: "rewards.custom"
    #   function: "compute_reward"

# 训练配置
training:
  output_dir: "./outputs/llm_grpo"
  
  num_train_epochs: 1
  
  per_device_train_batch_size: 1     # GRPO 显存消耗大
  gradient_accumulation_steps: 8
  
  learning_rate: 1.0e-5
  warmup_ratio: 0.1
  lr_scheduler_type: "cosine"
  
  weight_decay: 0.01
  max_grad_norm: 1.0
  
  save_steps: 500
  logging_steps: 10
  
  fp16: false
  bf16: true
  
  gradient_checkpointing: true

seed: 42
report_to: ["tensorboard"]
