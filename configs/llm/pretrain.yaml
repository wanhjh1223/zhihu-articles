# LLM 预训练配置
model:
  name: "qwen2.5-7b"
  load_in_4bit: false
  torch_dtype: "bf16"
  use_flash_attention: true

data:
  train_data_path: "./data/pretrain/train.jsonl"
  eval_data_path: "./data/pretrain/val.jsonl"
  max_length: 2048

training:
  output_dir: "./outputs/llm_pretrain"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 1e-4
  warmup_ratio: 0.01
  lr_scheduler_type: "cosine"
  
  save_steps: 1000
  eval_steps: 1000
  logging_steps: 10
  save_total_limit: 3
  
  fp16: false
  bf16: true
  gradient_checkpointing: true
  dataloader_num_workers: 4

lora:
  use_lora: true
  r: 16
  alpha: 32
  dropout: 0.05

seed: 42
