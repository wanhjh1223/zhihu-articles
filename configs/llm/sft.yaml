# LLM SFT 微调配置
model:
  name: "Qwen/Qwen2.5-7B"
  load_in_4bit: false
  torch_dtype: "bf16"
  use_flash_attention: true

data:
  train_data_path: "./data/sft/train.jsonl"
  eval_data_path: "./data/sft/val.jsonl"
  max_length: 2048
  system_prompt: "你是一个有用的 AI 助手。"

training:
  output_dir: "./outputs/llm_sft"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2e-4
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  weight_decay: 0.01
  
  save_steps: 500
  eval_steps: 500
  logging_steps: 10
  save_total_limit: 3
  
  fp16: false
  bf16: true
  gradient_checkpointing: true
  dataloader_num_workers: 4
  remove_unused_columns: false

lora:
  use_lora: true
  r: 8
  alpha: 32
  dropout: 0.1

seed: 42
