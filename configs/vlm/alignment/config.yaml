# ============================================
# VLM 视觉-语言对齐配置 (Alignment/Pre-training)
# ============================================
# 目标: 对齐视觉特征和语言模型的嵌入空间
# 策略: 冻结 LLM 和 Vision Encoder，只训练 Projector
# 数据格式: 图文对 (Image-Caption pairs)

# 模型配置
model:
  # 语言模型配置
  llm:
    model_name: "Qwen/Qwen2.5-7B"    # 或从 LLM 预训练模型加载
    # model_path: "./outputs/llm_pretrain/final"
    trust_remote_code: true
    torch_dtype: "bf16"
    
    # 对齐阶段冻结 LLM
    freeze: true
  
  # 视觉编码器配置
  vision_encoder:
    type: "clip"                      # clip|siglip|internvit
    model_name: "clip-vit-large-336"  # 具体模型名称
    
    # 是否冻结视觉编码器
    freeze: true
    
    # 选择层
    select_layer: -2                  # -1 表示最后一层，-2 表示倒数第二层
    select_feature: "patch"           # patch|cls_patch
  
  # 多模态连接器 (Projector) 配置
  projector:
    type: "mlp"                       # linear|mlp|qformer|perceiver
    
    # MLP 配置
    hidden_dim: 4096                  # 隐藏层维度
    num_layers: 2                     # MLP 层数
    
    # Q-Former 配置 (当 type=qformer 时)
    # num_query_tokens: 32
    # num_layers: 2
    # num_heads: 8
    
    # Perceiver 配置 (当 type=perceiver 时)
    # num_latents: 64
    # num_layers: 6
    # num_heads: 8

# 图像配置
image:
  image_token: "<image>"              # 图像 token
  image_start_token: "<im_start>"
  image_end_token: "<im_end>"
  image_patch_token: "<img_patch>"
  
  # 图像处理
  image_size: 336                   # 图像尺寸
  image_crop_resolution: 336
  
  # 是否添加图像位置编码
  use_image_pos_embed: false

# 数据配置
data:
  # 数据格式: auto|caption|conversation
  # caption: 纯图文对 (image + caption)
  # conversation: 多轮对话含图像
  format: "caption"
  
  train_data_path: "./data/vlm_alignment/train.jsonl"
  eval_data_path: "./data/vlm_alignment/val.jsonl"
  image_folder: "./data/images"
  
  # 数据加载
  num_workers: 4
  prefetch_factor: 2

# 训练配置
training:
  output_dir: "./outputs/vlm_alignment"
  
  # 对齐阶段通常训练较少轮数
  num_train_epochs: 1
  
  per_device_train_batch_size: 8     # 可以较大的 batch (LLM 冻结)
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 2
  
  # 对齐阶段使用较大学习率
  learning_rate: 1.0e-3
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  
  weight_decay: 0.0                  # projector 通常不加 weight decay
  max_grad_norm: 1.0
  
  save_strategy: "steps"
  save_steps: 1000
  save_total_limit: 3
  
  evaluation_strategy: "steps"
  eval_steps: 1000
  
  logging_strategy: "steps"
  logging_steps: 10
  
  fp16: false
  bf16: true
  
  gradient_checkpointing: false       # LLM 冻结，不需要
  
  # 只对 projector 进行优化
  freeze_vision_tower: true
  freeze_llm: true
  tune_mm_mlp_adapter: true

seed: 42
report_to: ["tensorboard"]
