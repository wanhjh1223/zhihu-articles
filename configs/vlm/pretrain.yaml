# VLM 预训练配置
model:
  llm_model_name: "Qwen/Qwen2.5-7B"
  vision_encoder_type: "clip"
  vision_model_name: "clip-vit-large"
  freeze_vision_encoder: true
  freeze_llm: true
  
  projector_type: "mlp"
  projector_hidden_dim: 4096
  num_projector_layers: 2
  
  image_token_index: 32000
  image_start_token: "<image>"
  image_end_token: "</image>"
  image_token: "<image_patch>"

data:
  train_data_path: "./data/vlm_pretrain/train.jsonl"
  eval_data_path: "./data/vlm_pretrain/val.jsonl"
  image_folder: "./data/images"
  max_length: 2048

training:
  output_dir: "./outputs/vlm_pretrain"
  num_train_epochs: 1
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 1e-3  # 投影层使用较高学习率
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  
  save_steps: 1000
  logging_steps: 10
  
  fp16: false
  bf16: true

seed: 42
