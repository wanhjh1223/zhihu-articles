# 数据收集配置
data_collection:
  # 微信数据导出
  wechat:
    export_path: "./data/raw/wechat"
    chat_types: ["private", "group"]
    start_date: null
    end_date: null
  
  # 公众号文章爬取
  articles:
    output_path: "./data/raw/articles"
    keywords: ["人工智能", "机器学习"]
    max_pages: 10
    delay: 2.0

# 数据清洗配置
preprocessing:
  remove_html: true
  remove_urls: true
  remove_emails: true
  remove_phone: true
  remove_emoji: false
  normalize_whitespace: true
  min_length: 10
  max_length: 8192
  remove_duplicates: true

# 数据集构建配置
dataset_builder:
  format: "conversation"  # alpaca, sharegpt, conversation, instruction
  system_prompt: "你是一个有用的 AI 助手。"
  max_length: 2048
  split_ratio: 0.1
  shuffle: true
  seed: 42
