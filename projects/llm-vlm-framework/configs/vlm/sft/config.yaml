# ============================================
# VLM 指令微调配置 (Instruction Tuning)
# ============================================
# 目标: 让模型学会理解图像并回答视觉相关问题
# 策略: 全参数微调或 LoRA 微调（解冻 LLM）
# 数据格式: 多模态对话 (Image + Multi-turn Conversation)

# 模型配置
model:
  llm:
    # 从对齐阶段模型继续
    model_path: "./outputs/vlm_alignment/final"
    trust_remote_code: true
    torch_dtype: "bf16"
    
    # SFT 阶段解冻 LLM
    freeze: false
  
  vision_encoder:
    type: "clip"
    model_name: "clip-vit-large-336"
    freeze: true                       # 视觉编码器通常保持冻结
    select_layer: -2
    select_feature: "patch"
  
  projector:
    type: "mlp"
    hidden_dim: 4096
    num_layers: 2
    # 是否从对齐阶段加载
    load_from_alignment: true

# 图像配置
image:
  image_token: "<image>"
  image_start_token: "<im_start>"
  image_end_token: "</im_end>"
  image_patch_token: "<img_patch>"
  image_size: 336

# 数据配置
data:
  # SFT 使用 conversation 格式
  format: "conversation"
  
  train_data_path: "./data/vlm_sft/train.jsonl"
  eval_data_path: "./data/vlm_sft/val.jsonl"
  image_folder: "./data/images"
  
  # 系统提示词
  system_prompt: "你是一个视觉 AI 助手，可以理解和分析图像内容。"
  
  num_workers: 4

# 训练配置
training:
  output_dir: "./outputs/vlm_sft"
  
  num_train_epochs: 3
  
  per_device_train_batch_size: 2     # SFT 显存需求更大
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8
  
  learning_rate: 2.0e-5              # SFT 使用较小学习率
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  
  weight_decay: 0.01
  max_grad_norm: 1.0
  
  save_strategy: "steps"
  save_steps: 500
  save_total_limit: 3
  
  evaluation_strategy: "steps"
  eval_steps: 500
  
  logging_strategy: "steps"
  logging_steps: 10
  
  fp16: false
  bf16: true
  
  gradient_checkpointing: true       # 开启以节省显存
  
  # 训练范围
  freeze_vision_tower: true
  freeze_llm: false                  # 解冻 LLM
  tune_mm_mlp_adapter: true

# LoRA 配置 (可选)
lora:
  use_lora: false                    # true 则使用 LoRA 微调
  r: 8
  alpha: 32
  dropout: 0.1
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
  bias: "none"

seed: 42
report_to: ["tensorboard"]
