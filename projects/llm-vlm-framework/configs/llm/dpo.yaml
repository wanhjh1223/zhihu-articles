# LLM DPO 训练配置
model:
  model_path: "./outputs/llm_sft/final"
  ref_model_path: null  # 如果为 null，使用 model_path 作为参考模型

data:
  train_data_path: "./data/preference/train.jsonl"
  eval_data_path: "./data/preference/val.jsonl"
  max_length: 2048
  max_prompt_length: 1024

training:
  output_dir: "./outputs/llm_dpo"
  num_train_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 5e-5
  warmup_ratio: 0.1
  lr_scheduler_type: "cosine"
  
  save_steps: 500
  eval_steps: 500
  logging_steps: 10
  
  fp16: false
  bf16: true
  remove_unused_columns: false

dpo:
  beta: 0.1
  label_smoothing: 0.0

lora:
  use_lora: true
  r: 8
  alpha: 32
  dropout: 0.1

seed: 42
